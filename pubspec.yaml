name: gestanea
description: A comprehensive pregnancy and baby care mobile app.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  font_awesome_flutter: ^10.6.0
  flutter:
    sdk: flutter

  # Map dependencies
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # URL launcher for phone calls and directions
  url_launcher: ^6.2.2

  # If you need location services (optional)
  geolocator: ^10.1.0
  permission_handler: ^11.1.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  shared_preferences: ^2.5.3
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/onboarding1.png
    - assets/images/onboarding2.png
    - assets/images/onboarding3.png
    - assets/images/fetus-inside-heart-shape-womb.png
  generate: true
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Italic.ttf
          style: italic
        - asset: assets/fonts/Lato-BoldItalic.ttf
          weight: 700
          style: italic