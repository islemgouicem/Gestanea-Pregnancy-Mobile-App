name: gestanea
description: A comprehensive pregnancy and baby care mobile app.
publish_to: none
version: 0.1.0

dependency_overrides:
  flutter_inset_box_shadow:
    path: ./patches/flutter_inset_box_shadow

environment:
  sdk: ^3.9.2

dependencies:
  font_awesome_flutter: ^10.6.0
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.2 # For generating unique IDs

  flutter_bloc: ^9.1.1

  equatable: ^2.0.7

  # Map dependencies
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # URL launcher for phone calls and directions
  url_launcher: ^6.2.2

  # If you need location services (optional)
  geolocator: ^10.1.0
  permission_handler: ^11.1.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  shared_preferences: ^2.5.3
  fl_chart: ^0.69.0
  flutter_svg: ^2.2.2
  flutter_inset_box_shadow: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/images/onboarding1.png
    - assets/images/onboarding2.png
    - assets/images/onboarding3.png
    - assets/images/onboarding4.png
    - assets/images/kickcounter.png
    - assets/images/fetus.png
  generate: true
  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Italic.ttf
          style: italic
        - asset: assets/fonts/Lato-BoldItalic.ttf
          weight: 700
          style: italic
